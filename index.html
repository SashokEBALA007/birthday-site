<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Операция: День Рождения</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;           /* ← запрещает прокрутку всей страницы */
    font-family: Arial, sans-serif;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
                url("https://images.unsplash.com/photo-1511884642898-4c92249e20b6?auto=format&fit=crop&w=1600&q=80");
    background-size: cover;
    background-position: center;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
}

/* экраны занимают всю высоту */
.screen {
    display: none;
    width: 100%;
    height: 100%;
    justify-content: center;
    align-items: center;
}

.active {
    display: flex;
}

/* общие карточки — сжимаются под экран */
.briefing, .form-box {
    width: 100%;
    max-width: 700px;
    background: rgba(20,20,20,0.9);
    border: 2px solid #ff8c00;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 0 25px rgba(255,140,0,0.3);
    /* разрешаем прокрутку ТОЛЬКО внутри карточки, если совсем не влезает */
    max-height: 100%;
    overflow-y: auto;
}

.form-box {
    border-color: #2ecc71;
    background: rgba(20,20,20,0.95);
}

/* подгоняем размеры под маленькие экраны */
@media (max-height: 700px) {
    .briefing, .form-box {
        padding: 12px;
    }
    h1 {
        font-size: 28px !important;
        margin-bottom: 8px !important;
    }
    .subtitle {
        margin-bottom: 12px !important;
        font-size: 14px;
    }
    button {
        padding: 10px 20px !important;
        margin-top: 12px !important;
    }
    input, textarea, select {
        margin-bottom: 10px !important;
        padding: 8px !important;
    }
    .section-title {
        margin: 10px 0 5px !important;
    }
}

h1 {
    font-size: 42px;
    margin-bottom: 10px;
    text-transform: uppercase;
}

.subtitle {
    color: #aaa;
    margin-bottom: 25px;
}

button {
    background: #ff8c00;
    border: none;
    padding: 15px 25px;
    font-size: 18px;
    color: white;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.3s;
    margin-top: 20px;
    width: 100%;
}

button:hover {
    transform: scale(1.02);
}

input, textarea, select {
    width: 100%;
    margin-top: 8px;
    margin-bottom: 18px;
    padding: 12px;
    border-radius: 6px;
    border: none;
    outline: none;
    background: #1b1c20;
    color: white;
    font-size: 16px;
}

label {
    font-size: 14px;
    color: #ccc;
    text-align: left;
    display: block;
}

.section-title {
    margin: 15px 0 10px;
    color: #ff8c00;
    font-weight: bold;
    text-align: left;
}
</style>
</head>
<body>

<!-- ЭКРАН 1 -->
<div id="screen1" class="screen active">
    <div class="briefing">
        <h1>Операция: Birthday Strike</h1>
        <p class="subtitle">Секретный брифинг перед миссией</p>
        <p>Цель: захватить пейнтбольную арену и отметить день рождения.<br><br>
        Подготовьтесь к операции и подтвердите участие.</p>
        <button onclick="goToForm()">ПРИНЯТЬ ЗАДАНИЕ</button>
    </div>
</div>

<!-- ЭКРАН 2 -->
<div id="screen2" class="screen">
    <div class="form-box">
        <h2 style="text-align:center; margin-bottom:20px;">АНКЕТА БОЙЦА</h2>

        <label>Позывной бойца</label>
        <input id="name" placeholder="Введите имя">

        <label>Готовы принять участие?</label>
        <select id="status">
            <option>Да, буду в строю</option>
            <option>Не смогу участвовать</option>
            <option>Пока под вопросом</option>
        </select>

        <div class="section-title">Полевой рацион</div>
        <label>Есть пожелания по еде?</label>
        <textarea id="food" placeholder="Шашлык, овощи, соусы и т.д." rows="2"></textarea>

        <div class="section-title">Снабжение отряда</div>
        <label>Боевая гидратация (напитки)</label>
        <textarea id="drinks" placeholder="Что хотите пить на операции?" rows="2"></textarea>

        <div class="section-title">Секретная информация</div>
        <label>Что важно знать командованию?</label>
        <textarea id="extra" placeholder="Аллергии, пожелания, вопросы..." rows="2"></textarea>

        <button onclick="sendData()">ОТПРАВИТЬ ДАННЫЕ</button>
    </div>
</div>

<script>
function goToForm() {
    document.getElementById("screen1").classList.remove("active");
    document.getElementById("screen2").classList.add("active");
}

function sendData() {
    const name = document.getElementById("name").value;
    const status = document.getElementById("status").value;
    const food = document.getElementById("food").value;
    const drinks = document.getElementById("drinks").value;
    const extra = document.getElementById("extra").value;

    const message = `🎯 НОВЫЙ БОЕЦ\n\n👤 Позывной: ${name}\n📌 Статус: ${status}\n\n🍖 Еда:\n${food}\n\n🥤 Напитки:\n${drinks}\n\n⚠️ Инфо:\n${extra}`;

    const TOKEN = "8789045496:AAHOePohvg6YDAOdSJ7Zaco38Ue9Ku67U00";
    const CHAT_ID = "8697789661";

    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: CHAT_ID, text: message })
    })
    .then(res => alert("МИССИЯ ПРИНЯТА ✔"))
    .catch(err => alert("Ошибка отправки ❌"));
}
</script>
</body>
</html>
